version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: chatapp-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - chatapp-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: chatapp-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - chatapp-network
    restart: unless-stopped

networks:
  chatapp-network:
    driver: bridge
